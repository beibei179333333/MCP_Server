<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>群成员导出工具</title>
<style>
  :root{
    --bg:#0f1420; --card:#171e2e; --line:#27304a; --txt:#e7ecf5;
    --muted:#9aa6c0; --accent:#3b82f6; --accent2:#22c55e; --danger:#ef4444;
    --cell-pad-y:16px; --cell-pad-x:20px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,"PingFang SC","Helvetica Neue",Roboto,sans-serif;
    font-size:16px; line-height:1.6; padding:0 0 60px;}
  header{position:sticky; top:0; z-index:20; background:#121829ee;
    backdrop-filter:blur(8px); padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;
    border-bottom:1px solid var(--line);}
  header h1{font-size:19px; margin:0; font-weight:700;}
  header p{margin:4px 0 0; color:var(--muted); font-size:13px;}
  .langsw{position:absolute; top:calc(env(safe-area-inset-top) + 12px); right:14px; display:flex; gap:6px;}
  .langsw button{background:#222b42; color:var(--muted); border:1px solid var(--line);
    border-radius:999px; padding:6px 12px; font-size:13px; cursor:pointer;}
  .langsw button.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  .wrap{max-width:1100px; margin:0 auto; padding:16px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:18px; margin-bottom:16px;}
  .card h2{font-size:15px; margin:0 0 12px; color:var(--muted); font-weight:600; letter-spacing:.5px;}
  label{display:block; font-size:14px; color:var(--muted); margin:10px 0 6px;}
  textarea,input[type=text],input[type=number],input[type=password],select{
    width:100%; background:#0d1322; border:1px solid var(--line); color:var(--txt);
    border-radius:12px; padding:14px; font-size:16px; outline:none;}
  textarea{min-height:150px; resize:vertical; line-height:1.5;}
  textarea:focus,input:focus,select:focus{border-color:var(--accent);}
  .row{display:flex; gap:12px; flex-wrap:wrap;}
  .row>div{flex:1 1 140px;}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:16px; font-size:17px; font-weight:600; border:none;
    border-radius:14px; color:#fff; background:var(--accent); cursor:pointer; margin-top:14px;}
  .btn:active{transform:scale(.99);}
  .btn.green{background:var(--accent2);}
  .btn.ghost{background:#222b42; color:var(--txt);}
  .btn:disabled{opacity:.5;}
  .chip{display:flex; align-items:center; gap:8px; background:#0d1322;
    border:1px solid var(--line); border-radius:999px; padding:10px 14px; font-size:14px;}
  .chip input{width:20px; height:20px; accent-color:var(--accent2);}
  details summary{cursor:pointer; color:var(--accent); font-size:14px; padding:6px 0;}
  .muted{color:var(--muted); font-size:13px;}
  .field{padding:14px 0; border-bottom:1px solid var(--line);}
  .field:last-child{border-bottom:none;}
  .toggle{display:flex; align-items:center; gap:12px; font-size:16px; color:var(--txt); margin:0; cursor:pointer;}
  .toggle input{width:22px; height:22px; accent-color:var(--accent2); flex:0 0 auto;}
  .toggle .rec{margin-left:auto; font-size:11px; color:#7ee2a8; background:#143a24; border-radius:999px; padding:2px 8px;}
  .hint{color:var(--muted); font-size:12.5px; line-height:1.5; margin:6px 0 0 34px;}
  .field>label:not(.toggle){margin-top:0;}
  .field .hint.nopad{margin-left:0;}
  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:6px;}
  .stat{background:#0d1322; border:1px solid var(--line); border-radius:12px; padding:14px; text-align:center;}
  .stat b{display:block; font-size:22px; margin-bottom:2px;}
  .stat span{color:var(--muted); font-size:12px;}
  .bar{height:10px; background:#0d1322; border-radius:999px; overflow:hidden; margin:10px 0;}
  .bar>i{display:block; height:100%; width:0; background:var(--accent2); transition:width .3s;}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--line); border-radius:14px;}
  table{border-collapse:separate; border-spacing:0; width:100%; min-width:720px;}
  th,td{padding:var(--cell-pad-y) var(--cell-pad-x); text-align:left; font-size:15px;
    white-space:nowrap; border-bottom:1px solid var(--line);}
  th{position:sticky; top:0; background:#1b2236; color:var(--muted); font-weight:600; z-index:5;}
  tbody tr:nth-child(even){background:#141b2b;}
  td.name{max-width:280px; white-space:normal;}
  .tag{display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; background:#1d2740; color:var(--muted);}
  .tag.on{background:#143a24; color:#7ee2a8;}
  .pill{font-variant-numeric:tabular-nums;}
  .toolbar{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px;}
  .toolbar .btn{width:auto; flex:1 1 120px; margin-top:0; padding:13px 14px; font-size:15px;}
  .hidden{display:none;}
  .err{color:#ffb4b4; background:#3a1620; border:1px solid #5a2230; padding:12px; border-radius:12px; margin-top:10px;}
  .count-badge{background:var(--accent); color:#fff; border-radius:999px; padding:2px 10px; font-size:13px; margin-left:8px;}
</style>
</head>
<body>
<header>
  <div class="langsw">
    <button id="lang_zh" onclick="setLang('zh')">中文</button>
    <button id="lang_vi" onclick="setLang('vi')">Tiếng Việt</button>
  </div>
  <h1 data-i18n="app_title">群成员导出工具</h1>
  <p data-i18n="app_sub">批量粘贴群链接 · 自动去重合并 · 过滤广告号/无用户名 · 表格导出</p>
</header>

<div class="wrap">

  <div class="card">
    <h2><span data-i18n="c1_h">① 批量群链接</span> <span id="parsedBadge" class="count-badge hidden">0</span></h2>
    <label data-i18n="c1_label">每行一个，支持 https://t.me/xxx、@xxx、-100开头ID（也支持逗号分隔）</label>
    <textarea id="links" placeholder="https://t.me/group1&#10;@group2&#10;-1001234567890"></textarea>
    <div class="row">
      <div><button class="btn ghost" id="btnFile" data-i18n="btn_file">📂 上传 .txt 文件</button></div>
      <div><button class="btn ghost" id="btnParse" data-i18n="btn_parse">🔍 解析预览</button></div>
    </div>
    <input type="file" id="file" accept=".txt,.csv" class="hidden">
    <div id="parseInfo" class="muted" style="margin-top:8px;"></div>
  </div>

  <div class="card">
    <h2><span data-i18n="c2_h">② 过滤选项</span> <span class="count-badge" id="recBtn" data-i18n="rec_btn" style="cursor:pointer;background:#143a24;color:#7ee2a8;">↻ 一键推荐</span></h2>
    <p class="muted" style="margin:0 0 8px;" data-i18n="c2_intro">勾选项默认已按“最干净的真人名单”帮你配好，可逐项调整。每项下方有说明。</p>

    <div class="field">
      <label class="toggle"><input type="checkbox" id="f_username" checked><span data-i18n="f_username_l">过滤无用户名</span><span class="rec" data-i18n="rec_badge">推荐开</span></label>
      <p class="hint" data-i18n="f_username_h"></p>
    </div>
    <div class="field">
      <label class="toggle"><input type="checkbox" id="f_ads" checked><span data-i18n="f_ads_l">过滤广告 / 营销号</span><span class="rec" data-i18n="rec_badge">推荐开</span></label>
      <p class="hint" data-i18n="f_ads_h"></p>
    </div>
    <div class="field">
      <label class="toggle"><input type="checkbox" id="f_bots" checked><span data-i18n="f_bots_l">过滤机器人 (bot)</span><span class="rec" data-i18n="rec_badge">推荐开</span></label>
      <p class="hint" data-i18n="f_bots_h"></p>
    </div>
    <div class="field">
      <label class="toggle"><input type="checkbox" id="f_scam" checked><span data-i18n="f_scam_l">过滤诈骗 / 仿冒号</span><span class="rec" data-i18n="rec_badge">推荐开</span></label>
      <p class="hint" data-i18n="f_scam_h"></p>
    </div>
    <div class="field">
      <label class="toggle"><input type="checkbox" id="f_deleted" checked><span data-i18n="f_deleted_l">过滤已注销 / 空白账号</span><span class="rec" data-i18n="rec_badge">推荐开</span></label>
      <p class="hint" data-i18n="f_deleted_h"></p>
    </div>
    <div class="field">
      <label class="toggle"><input type="checkbox" id="f_nophoto"><span data-i18n="f_nophoto_l">过滤无头像账号</span></label>
      <p class="hint" data-i18n="f_nophoto_h"></p>
    </div>
    <div class="field">
      <label class="toggle"><input type="checkbox" id="f_random"><span data-i18n="f_random_l">过滤疑似随机用户名</span></label>
      <p class="hint" data-i18n="f_random_h"></p>
    </div>
    <div class="field">
      <label class="toggle"><input type="checkbox" id="f_premium"><span data-i18n="f_premium_l">仅保留会员 (Premium)</span></label>
      <p class="hint" data-i18n="f_premium_h"></p>
    </div>
    <div class="field">
      <label class="toggle"><input type="checkbox" id="f_verified"><span data-i18n="f_verified_l">仅保留官方认证号</span></label>
      <p class="hint" data-i18n="f_verified_h"></p>
    </div>

    <div class="field">
      <label data-i18n="minmsg_l">最少消息数（活跃度）</label>
      <input type="number" id="minmsg" value="0" min="0">
      <p class="hint nopad" data-i18n="minmsg_h"></p>
    </div>
    <div class="field">
      <label data-i18n="lang_l">仅保留指定语言（可留空）</label>
      <input type="text" id="langkeep" data-i18n-ph="langkeep_ph" placeholder="例如 zh,en">
      <p class="hint nopad" data-i18n="lang_h"></p>
    </div>
    <div class="field">
      <label data-i18n="adth_l">广告判定严格度（数字越小越严）</label>
      <input type="number" id="adth" value="2" min="1">
      <p class="hint nopad" data-i18n="adth_h"></p>
    </div>
    <div class="field">
      <label data-i18n="adkw_l">追加广告关键词（每行一个，可留空）</label>
      <textarea id="adkw" style="min-height:70px;" data-i18n-ph="adkw_ph"></textarea>
      <p class="hint nopad" data-i18n="adkw_h"></p>
    </div>
    <div class="field">
      <label data-i18n="wl_l">用户名白名单（每行一个，永不过滤）</label>
      <textarea id="whitelist" style="min-height:70px;" data-i18n-ph="wl_ph"></textarea>
      <p class="hint nopad" data-i18n="wl_h"></p>
    </div>

    <div class="field">
      <label class="toggle"><input type="checkbox" id="f_demo"><span data-i18n="demo_l">演示模式（免密钥 / 免联网）</span></label>
      <p class="hint" data-i18n="demo_h"></p>
    </div>

    <details style="margin-top:6px;">
      <summary data-i18n="adv_summary">高级设置（密钥 / 接口，通常不用改）</summary>
      <div class="field">
        <label data-i18n="token_l">密钥 Token</label>
        <input type="password" id="token" data-i18n-ph="token_ph" placeholder="粘贴 JWT...">
        <p class="hint nopad" data-i18n="token_h"></p>
      </div>
      <div class="field">
        <label data-i18n="base_l">接口域名 Base URL</label>
        <input type="text" id="base" placeholder="https://fun-stat-bot.net">
        <p class="hint nopad" data-i18n="base_h"></p>
      </div>
      <div class="field">
        <label data-i18n="proxy_l">网络代理（可选，解决跨域/HTTP拦截）</label>
        <input type="text" id="proxy" data-i18n-ph="proxy_ph" placeholder="https://corsproxy.io/?url={url}">
        <p class="hint nopad" data-i18n="proxy_h"></p>
      </div>
      <div class="field">
        <label data-i18n="psize_l">每页数量</label>
        <input type="number" id="psize" value="200" min="1">
        <p class="hint nopad" data-i18n="psize_h"></p>
      </div>
      <div class="field">
        <label data-i18n="ep_l">接口路径（留空=自动探测）</label>
        <input type="text" id="endpoint" data-i18n-ph="ep_ph" placeholder="/api/group/members/export">
        <p class="hint nopad" data-i18n="ep_h"></p>
      </div>
      <div class="field">
        <label data-i18n="param_l">参数名（一般留空自动识别）</label>
        <div class="row">
          <div><input type="text" id="gp" data-i18n-ph="gp_ph" placeholder="群参数 group_id"></div>
          <div><input type="text" id="pp" data-i18n-ph="pp_ph" placeholder="分页参数 page"></div>
          <div><input type="text" id="sp" data-i18n-ph="sp_ph" placeholder="每页参数 page_size"></div>
        </div>
        <p class="hint nopad" data-i18n="param_h"></p>
      </div>
    </details>
  </div>

  <div class="card">
    <h2 data-i18n="c3_h">③ 开始导出</h2>
    <button class="btn green" id="btnRun" data-i18n="btn_run">🚀 开始全自动导出</button>
    <div id="progressBox" class="hidden" style="margin-top:14px;">
      <div class="muted" id="statusMsg"></div>
      <div class="bar"><i id="barFill"></i></div>
      <div class="muted" id="progDetail"></div>
    </div>
    <div id="errBox" class="err hidden"></div>
  </div>

  <div class="card hidden" id="resultCard">
    <h2 data-i18n="c4_h">④ 结果</h2>
    <div class="stat-grid" id="statGrid"></div>
    <div class="toolbar" style="margin-top:14px;">
      <button class="btn" id="dlCsv" data-i18n="dl_csv">⬇️ CSV(Excel可开)</button>
      <button class="btn" id="dlJson" data-i18n="dl_json">⬇️ JSON</button>
    </div>
    <div class="table-scroll"><table id="tbl"><thead></thead><tbody></tbody></table></div>
    <p class="muted" id="tblNote" style="margin-top:10px;"></p>
  </div>

</div>

<script src="core.js"></script>
<script src="i18n.js"></script>
<script>
const $ = s => document.querySelector(s);
let LAST = null, LAST_STATS = null, RUNNING = false;
let LANG = localStorage.getItem('ge_lang') || ((navigator.language||'').toLowerCase().startsWith('vi') ? 'vi' : 'zh');
if(!['zh','vi'].includes(LANG)) LANG='zh';
function t(key, vars){
  let s = (I18N[LANG] && I18N[LANG][key] != null) ? I18N[LANG][key] : (I18N.zh[key] != null ? I18N.zh[key] : key);
  if(vars) for(const k in vars) s = s.split('{'+k+'}').join(vars[k]);
  return s;
}
function setLang(lang){
  LANG = (lang==='vi') ? 'vi' : 'zh';
  localStorage.setItem('ge_lang', LANG);
  applyLang();
}
function applyLang(){
  document.documentElement.lang = (LANG==='vi') ? 'vi' : 'zh-CN';
  document.title = t('app_title');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ el.placeholder = t(el.dataset.i18nPh); });
  $('#lang_zh').classList.toggle('active', LANG==='zh');
  $('#lang_vi').classList.toggle('active', LANG==='vi');
  if(!RUNNING) $('#statusMsg').textContent = t('st_ready');
  if($('#links').value.trim()) doParse();
  if(LAST) showResult(LAST, LAST_STATS);
}

$('#token').value = localStorage.getItem('ge_token') || '';
$('#base').value = localStorage.getItem('ge_base') || 'https://fun-stat-bot.net';
$('#proxy').value = localStorage.getItem('ge_proxy') || '';
$('#token').addEventListener('change', e => localStorage.setItem('ge_token', e.target.value.trim()));
$('#base').addEventListener('change', e => localStorage.setItem('ge_base', e.target.value.trim()));
$('#proxy').addEventListener('change', e => localStorage.setItem('ge_proxy', e.target.value.trim()));

// Optionally route a request URL through a CORS proxy to defeat Safari's
// cross-origin / mixed-content blocking. {url} is replaced with the encoded
// target; if absent, the encoded target is appended.
function wrapUrl(u){
  const p = ($('#proxy') ? $('#proxy').value.trim() : '');
  if(!p) return u;
  return p.includes('{url}') ? p.replace('{url}', encodeURIComponent(u)) : (p + encodeURIComponent(u));
}

$('#btnFile').onclick = () => $('#file').click();
$('#file').onchange = e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => { $('#links').value = ($('#links').value ? $('#links').value+'\n' : '') + r.result; doParse(); };
  r.readAsText(f);
};
$('#btnParse').onclick = doParse;

function doParse(){
  const { groups, skipped } = GE.parseMany($('#links').value);
  const b = $('#parsedBadge'); b.textContent = groups.length; b.classList.remove('hidden');
  let msg = t('parse_found', {n:'<b>'+groups.length+'</b>'});
  if(skipped.length) msg += t('parse_skip', {n:'<span style="color:#ffb4b4">'+skipped.length+'</span>'});
  $('#parseInfo').innerHTML = msg;
  return groups;
}

function linesOf(id){ return $('#'+id).value.split(/[\n,，]+/).map(s=>s.trim()).filter(Boolean); }
function filterCfg(){
  return {
    requireUsername: $('#f_username').checked, filterAds: $('#f_ads').checked,
    filterBots: $('#f_bots').checked, filterScam: $('#f_scam').checked,
    filterDeleted: $('#f_deleted').checked, noPhoto: $('#f_nophoto').checked,
    filterRandomUsername: $('#f_random').checked, premiumOnly: $('#f_premium').checked,
    verifiedOnly: $('#f_verified').checked, minMessages: +$('#minmsg').value || 0,
    languageKeep: linesOf('langkeep').map(s=>s.toLowerCase()), adThreshold: +$('#adth').value || 2,
    extraAdKeywords: linesOf('adkw'),
    whitelist: linesOf('whitelist').map(s=>s.replace(/^@/,'').toLowerCase()),
  };
}
$('#recBtn').onclick = () => {
  ['f_username','f_ads','f_bots','f_scam','f_deleted'].forEach(i=>$('#'+i).checked=true);
  ['f_nophoto','f_random','f_premium','f_verified'].forEach(i=>$('#'+i).checked=false);
  $('#minmsg').value=0; $('#langkeep').value=''; $('#adth').value=2;
  const b=$('#recBtn'); b.textContent=t('rec_done'); setTimeout(()=>b.textContent=t('rec_btn'), 1500);
};

const SWAGGER_PATHS = ["/swagger/v1/swagger.json","/swagger.json","/openapi.json","/v1/swagger.json","/api/swagger.json"];
const PATH_KW = ["member","participant","成员","群成员","groupuser","group_user"];
const EXP_KW = ["export","导出","download","list","all"];
async function fetchJSON(url, token){
  return fetch(wrapUrl(url), { headers: token ? { Authorization: "Bearer " + token, Accept: "application/json" } : { Accept: "application/json" }});
}
async function discover(base, token){
  for(const p of SWAGGER_PATHS){
    try{ const res = await fetchJSON(base + p, token); if(!res.ok) continue;
      const spec = await res.json(); if(spec && (spec.paths || spec.openapi || spec.swagger)) return spec;
    }catch(e){}
  }
  return null;
}
function pickEndpoint(spec){
  let best=null, bestScore=-1;
  for(const path in (spec.paths||{})){
    const ops = spec.paths[path]; if(typeof ops!=='object') continue;
    for(const method in ops){
      if(!["get","post"].includes(method.toLowerCase())) continue;
      const op = ops[method]||{};
      const hay = [path, op.operationId||"", op.summary||"", op.description||"", (op.tags||[]).join(" ")].join(" ").toLowerCase();
      let s=0;
      if(PATH_KW.some(k=>hay.includes(k))) s+=3;
      if(EXP_KW.some(k=>hay.includes(k))) s+=2;
      if(hay.includes("group")||hay.includes("群")||hay.includes("chat")) s+=1;
      if(s>bestScore){ bestScore=s; best={path, method:method.toUpperCase(), op}; }
    }
  }
  return bestScore>0 ? best : null;
}
function detectParams(op){
  const names={}; (op.parameters||[]).forEach(p=>{ if(p&&p.name) names[p.name.toLowerCase()]=p.name; });
  const out={};
  for(const c of ["page","pageindex","page_index","pagenumber","page_number"]) if(names[c]){out.page=names[c];out.offset=false;break;}
  if(!out.page) for(const c of ["offset","skip","start"]) if(names[c]){out.page=names[c];out.offset=true;break;}
  for(const c of ["page_size","pagesize","size","limit","count","per_page","take"]) if(names[c]){out.size=names[c];break;}
  for(const c of ["group_id","groupid","chat_id","chatid","group","chat","id","gid"]) if(names[c]){out.group=names[c];break;}
  return out;
}
async function fetchMembers(base, token, group, opts, onPage){
  let endpoint=opts.endpoint, method=opts.method||"GET";
  let gp=opts.group_param, pp=opts.page_param, sp=opts.size_param;
  let offsetMode=false, startAt=1;
  if(!endpoint){
    const spec = await discover(base, token);
    if(spec){ const found = pickEndpoint(spec);
      if(found){ endpoint=found.path; method=found.method;
        const d=detectParams(found.op);
        if(!pp&&d.page){pp=d.page; offsetMode=!!d.offset; startAt=d.offset?0:1;}
        if(!sp&&d.size) sp=d.size; if(!gp&&d.group) gp=d.group;
      }
    }
  }
  if(!endpoint) throw new Error(t('err_endpoint'));
  const size = +opts.page_size || 200;
  const results=[]; let page=startAt, total=null, emptyHit=false;
  while(true){
    const params = new URLSearchParams();
    params.set(gp||"group_id", group);
    if(sp) params.set(sp, size);
    if(pp) params.set(pp, page);
    const url = base + endpoint + (method==="GET" ? "?"+params.toString() : "");
    let res;
    if(method==="GET") res = await fetchJSON(url, token);
    else res = await fetch(wrapUrl(base+endpoint), { method:"POST", headers:{ "Content-Type":"application/json", Authorization:"Bearer "+token }, body: JSON.stringify(Object.fromEntries(params)) });
    if(res.status===401) throw new Error(t('err_401'));
    if(res.status===404) throw new Error(t('err_404'));
    if(!res.ok) throw new Error(t('err_http', {s:res.status}));
    const data = await res.json();
    const { list, total: tt } = GE.extractList(data);
    if(tt!=null) total=tt;
    results.push(...list);
    if(onPage) onPage(results.length, total);
    if(!pp) break;
    if(list.length===0){ if(emptyHit) break; emptyHit=true; }
    if(total!=null && results.length>=total) break;
    if(sp && list.length<size) break;
    page += offsetMode ? size : 1;
  }
  return results;
}

$('#btnRun').onclick = async () => {
  $('#errBox').classList.add('hidden');
  const groups = doParse();
  if(!groups.length){ showErr(t('err_paste_valid')); return; }
  const demo = $('#f_demo').checked;
  const token = $('#token').value.trim();
  const base = ($('#base').value.trim() || 'https://fun-stat-bot.net').replace(/\/+$/,'');
  if(!demo && !token){ showErr(t('err_token')); return; }

  RUNNING = true; $('#btnRun').disabled = true;
  $('#progressBox').classList.remove('hidden');
  $('#resultCard').classList.add('hidden');
  const opts = { page_size:+$('#psize').value||200, endpoint:$('#endpoint').value.trim(),
    group_param:$('#gp').value.trim(), page_param:$('#pp').value.trim(), size_param:$('#sp').value.trim() };
  const raw=[]; let done=0;
  try{
    for(const g of groups){
      $('#statusMsg').textContent = t('prog_fetch', {g});
      let recs;
      if(demo){ recs = GE.demoMembers(g); }
      else { recs = await fetchMembers(base, token, g, opts, (n,total)=>{
        $('#progDetail').textContent = t('prog_detail',{a:done+1,b:groups.length,n:raw.length+n}) + (total?t('prog_detail_total',{t:total}):'');
      }); }
      for(const r of recs) raw.push(GE.normalizeMember(r, g));
      done++;
      $('#barFill').style.width = Math.round(done/groups.length*100)+'%';
      $('#progDetail').textContent = t('prog_detail',{a:done,b:groups.length,n:raw.length});
    }
    $('#statusMsg').textContent = t('st_merge');
    const { kept, stats } = GE.runPipeline(raw, filterCfg());
    LAST = kept; LAST_STATS = stats;
    showResult(kept, stats);
    $('#statusMsg').textContent = t('st_done');
  }catch(e){
    let m = ''+(e && e.message || e);
    if(/Failed to fetch|NetworkError|Load failed/i.test(m)) m += t('err_net_suffix');
    showErr(m);
  }finally{ RUNNING=false; $('#btnRun').disabled=false; }
};

function showResult(kept, stats){
  const f = stats.filtered||{};
  const others = Object.keys(f).filter(k=>!['no_username','ad_marketing'].includes(k)).reduce((s,k)=>s+f[k],0);
  $('#statGrid').innerHTML = `
    <div class="stat"><b>${stats.seen||0}</b><span>${t('stat_seen')}</span></div>
    <div class="stat"><b style="color:#7ee2a8">${stats.kept||0}</b><span>${t('stat_kept')}</span></div>
    <div class="stat"><b>${stats.merged||0}</b><span>${t('stat_merged')}</span></div>
    <div class="stat"><b>${f.no_username||0}</b><span>${t('stat_nouser')}</span></div>
    <div class="stat"><b>${f.ad_marketing||0}</b><span>${t('stat_ad')}</span></div>
    <div class="stat"><b>${others}</b><span>${t('stat_other')}</span></div>`;
  const detail = Object.keys(f).sort().map(k=>`${t('reason_'+k)} ${f[k]}`).join(' · ');
  let dl = document.getElementById('filterDetail');
  if(!dl){ dl=document.createElement('p'); dl.id='filterDetail'; dl.className='muted'; dl.style.margin='10px 0 0'; $('#statGrid').after(dl); }
  dl.textContent = detail ? (t('filter_detail_prefix')+detail) : t('filter_none');
  const cols = GE.TABLE_COLUMNS;
  $('#tbl thead').innerHTML = '<tr>'+cols.map(c=>`<th>${t('col_'+c)}</th>`).join('')+'</tr>';
  const fmt=(c,m)=>{ const row=GE.toRow(m); let v=row[c];
    if(c==='username') return v?'@'+v:'<span class="muted">—</span>';
    if(c==='is_premium') return v?`<span class="tag on">${t('premium_tag')}</span>`:'';
    if(c==='message_count') return `<span class="pill">${v||0}</span>`;
    return (v===''||v==null)?'<span class="muted">—</span>':v;
  };
  $('#tbl tbody').innerHTML = kept.map(m=>'<tr>'+cols.map(c=>`<td class="${c==='full_name'?'name':''}">${fmt(c,m)}</td>`).join('')+'</tr>').join('');
  $('#tblNote').textContent = t('tbl_note',{n:kept.length});
  $('#resultCard').classList.remove('hidden');
}

function download(name, text, mime){
  const blob = new Blob([text], { type: mime+';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
$('#dlCsv').onclick = () => { if(LAST) download(t('file_csv'), GE.toCSV(LAST), 'text/csv'); };
$('#dlJson').onclick = () => { if(LAST) download(t('file_json'), GE.toJSON(LAST), 'application/json'); };
function showErr(m){ const e=$('#errBox'); e.textContent='⚠️ '+m; e.classList.remove('hidden'); }

applyLang();
</script>
