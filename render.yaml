services:
  - type: web
    name: group-export
    runtime: python
    plan: free
    branch: claude/group-member-export-tool-sWRs7
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 600
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
